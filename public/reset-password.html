<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restablecer Contraseña | AUBA Beauty Studio</title>
    <meta name="description" content="Restablece tu contraseña de AUBA Beauty Studio." />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" type="image/png" href="assets/Logo Auba.png" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2C2C3E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>

<body style="background: linear-gradient(135deg, #FFF0F5 0%, #E6E6FA 100%); min-height: 100vh;">
    <div class="reset-password-container">
        <div class="reset-password-card">
            <div class="logo-container">
                <a href="index.html">
                    <img src="assets/Logo Auba.png" alt="AUBA" />
                </a>
            </div>

            <!-- Reset Form -->
            <div id="reset-form-view">
                <h1>Nueva Contraseña</h1>
                <p class="subtitle">Ingresa tu nueva contraseña para tu cuenta.</p>

                <form id="reset-password-form" class="auth-form">
                    <div id="reset-error" class="auth-error"></div>
                    <div class="form-group">
                        <label>Nueva contraseña <span class="required">*</span></label>
                        <div class="password-wrapper">
                            <input type="password" id="new-password" class="form-input"
                                placeholder="Mínimo 4 caracteres" required minlength="4">
                            <button type="button" class="password-toggle"
                                onclick="togglePassword('new-password', this)">👁</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar contraseña <span class="required">*</span></label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm-password" class="form-input"
                                placeholder="Repite tu contraseña" required>
                            <button type="button" class="password-toggle"
                                onclick="togglePassword('confirm-password', this)">👁</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary full-width">Cambiar Contraseña</button>
                </form>
            </div>

            <!-- Success View -->
            <div id="reset-success-view" class="hidden">
                <h1>¡Listo!</h1>
                <p class="subtitle">Tu contraseña ha sido actualizada correctamente.</p>
                <div style="text-align: center; margin-top: 24px;">
                    <a href="index.html" class="btn-primary">Ir a Iniciar Sesión</a>
                </div>
            </div>

            <!-- Invalid Token View -->
            <div id="invalid-token-view" class="hidden">
                <h1>Enlace Inválido</h1>
                <p class="subtitle">Este enlace ha expirado o no es válido. Por favor solicita un nuevo enlace de
                    recuperación.</p>
                <div style="text-align: center; margin-top: 24px;">
                    <a href="index.html" class="btn-primary">Volver al Inicio</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // If no token, show invalid view
        if (!token) {
            document.getElementById('reset-form-view').classList.add('hidden');
            document.getElementById('invalid-token-view').classList.remove('hidden');
        }

        // Handle form submission
        document.getElementById('reset-password-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('reset-error');

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                errorEl.textContent = 'Las contraseñas no coinciden';
                errorEl.classList.add('visible');
                return;
            }

            if (newPassword.length < 4) {
                errorEl.textContent = 'La contraseña debe tener al menos 4 caracteres';
                errorEl.classList.add('visible');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('reset-form-view').classList.add('hidden');
                    document.getElementById('reset-success-view').classList.remove('hidden');
                } else {
                    if (data.error === 'Token inválido o expirado') {
                        document.getElementById('reset-form-view').classList.add('hidden');
                        document.getElementById('invalid-token-view').classList.remove('hidden');
                    } else {
                        errorEl.textContent = data.error || 'Error al restablecer la contraseña';
                        errorEl.classList.add('visible');
                    }
                }
            } catch (error) {
                errorEl.textContent = 'Error de conexión';
                errorEl.classList.add('visible');
            }
        });
    </script>
    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => { });
        }
    </script>
</body>

</html>
