<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión — AUBA Beauty Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #FFF0F5 0%, #FFFFFF 50%, #FFF5F7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2C2C3E;
        }

        .offline-container {
            text-align: center;
            padding: 40px 24px;
            max-width: 400px;
        }

        .offline-icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #6E6E7A;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-retry {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 154, 158, 0.3);
        }

        .btn-retry:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Sin Conexión</h1>
        <p>
            Parece que no tienes conexión a internet.
            Verifica tu WiFi o datos móviles e intenta de nuevo.
        </p>
        <button class="btn-retry" onclick="window.location.reload()">
            Reintentar
        </button>
    </div>
</body>

</html>
